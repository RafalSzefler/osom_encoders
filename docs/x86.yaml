operand_encodings:
  - id: ZO
    description: Zero operands.
  - id: I
    description: Single immediate operand.
  - id: MI
    description: Immediate to memory/register operands.
  - id: OI
    description: Immediate to register operands.
  - id: MR
    description: Register operand to memory/register operand (or vice versa).
  - id: M
    description: Single register or memory operand.

operands:
  - id: Imm8
    description: 8-bit immediate value.
  - id: Imm16
    description: 16-bit immediate value.
  - id: Imm32
    description: 32-bit immediate value.
  - id: Imm64
    description: 64-bit immediate value.
  - id: RM8
    description: 8-bit general purpose register or memory operand.
  - id: RM16
    description: 16-bit general purpose register or memory operand.
  - id: RM32
    description: 32-bit general purpose register or memory operand.
  - id: RM64
    description: 64-bit general purpose register or memory operand.
  - id: Reg8
    description: 8-bit general purpose register.
  - id: Reg16
    description: 16-bit general purpose register.
  - id: Reg32
    description: 32-bit general purpose register.
  - id: Reg64
    description: 64-bit general purpose register.
  - id: Mem64
    description: "64-bit memory operand (note: we support 64-bit memories only)"

flags:
  - id: OSO
    description: Requires operand size override prefix.
  - id: RexW
    description: Requires REX.W prefix.

instruction_groups:
  - id: 0
    name: lock
    variants:
      - id: 0
        primary_opcode: F0
        operand_encoding: ZO
        description: Lock prefix used for atomic operations.

  - id: 1
    name: nop
    variants:
      - id: 0
        primary_opcode: 90
        operand_encoding: ZO
        description: No operation.

  - id: 2
    name: cpuid
    variants:
      - id: 0
        primary_opcode: 0FA2
        operand_encoding: ZO
        description: CPU identification.

  - id: 3
    name: sysenter
    variants:
      - id: 0
        primary_opcode: 0F34
        operand_encoding: ZO
        description: Fast call to privilege level 0 system procedures.

  - id: 4
    name: syscall
    variants:
      - id: 0
        primary_opcode: 0F05
        operand_encoding: ZO
        description: Fast call to privilege level 0 system procedures. New variant of sysenter for 64-bit mode.

  - id: 5
    name: ret
    variants:
      - id: 0
        primary_opcode: C3
        operand_encoding: ZO
        description: Return to calling procedure.
      - id: 1
        primary_opcode: C2
        operand_encoding: I
        operands: [Imm16]
        description: Pop [16-bit immediate] bytes from stack and return to calling procedure.

  - id: 6
